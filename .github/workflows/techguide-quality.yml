name: TechGuide Quality

on:
  pull_request:
    paths:
      - 'techguide/**'
      - '.github/workflows/techguide-quality.yml'
  push:
    paths:
      - 'techguide/**'
      - '.github/workflows/techguide-quality.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: techguide-quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: techguide

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: techguide/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate
        run: pnpm validate
