version: 1
applications:
  - appRoot: techguide
    env:
      variables:
        AMPLIFY_MONOREPO_APP_ROOT: techguide
    frontend:
      phases:
        preBuild:
          commands:
            - corepack enable
            - pnpm install --frozen-lockfile
        build:
          commands:
            - pnpm build
            - cd build/compute/default/
            - pnpm install --prod --no-frozen-lockfile
      artifacts:
        baseDirectory: build
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
